<!DOCTYPE html>
<html>
<body style="margin:0;padding:0;background:#0A0F1E;
  font-family:Arial,sans-serif;">
<div style="max-width:480px;margin:40px auto;
  background:#0A0F1E;padding:40px 32px;
  border-radius:12px;border:1px solid rgba(255,255,255,0.08);">
  
  <h1 style="font-size:24px;font-weight:700;
    color:#F8FAFC;margin:0 0 8px 0;">
    FleetPulse
  </h1>
  <div style="width:40px;height:2px;
    background:#3B82F6;margin-bottom:32px;"></div>

  <h2 style="font-size:20px;font-weight:600;
    color:#F8FAFC;margin:0 0 8px 0;">
    Confirm your account
  </h2>
  <p style="color:#94A3B8;font-size:15px;
    line-height:1.6;margin:0 0 32px 0;">
    You're one step away from accessing your fleet 
    dashboard. Click below to confirm your email address.
  </p>

  <a href="{{ .ConfirmationURL }}"
    style="display:inline-block;background:#3B82F6;
    color:white;padding:14px 28px;border-radius:8px;
    text-decoration:none;font-weight:600;font-size:15px;">
    Confirm my account ?
  </a>

  <p style="color:#475569;font-size:12px;
    margin-top:32px;padding-top:24px;
    border-top:1px solid rgba(255,255,255,0.06);">
    If you didn't create a FleetPulse account, 
    you can safely ignore this email.<br/>
    © 2026 FleetPulse. All rights reserved.
  </p>
</div>
</body>
</html>
